# Qwen3 4B Search R1 Agentic RL
#   - Training: Megatron (TP1/PP1)
#   - Inference: SGLang
#   - Data: nq_search (train) + HotpotQA (val)
#   - Model: Qwen3-4B-Base (not Instruct)
#
# Requires: RETRIEVAL_ENDPOINT
#
# Usage:
#   RETRIEVAL_ENDPOINT=http://x.x.x.x:8001/retrieve \
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type search_r1 \
#       --config fuyao_examples/search_r1/search_r1_qwen3_4b.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3-4b-search-r1-${oc.env:AREAL_RUN_TIMESTAMP,0}
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 10
tokenizer_path: ${actor.path}

# ── Agentic Config ──
retrieval_endpoint: ""  # Set via RETRIEVAL_ENDPOINT env var
max_turns: 10
max_tool_uses: 2
max_total_tokens: 12800
system_prompt: "You're a helpful assistant."

cluster:
  n_nodes: 1
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/areal_zjh_output/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/areal_zjh_output/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) — SGLang ──
rollout:
  backend: "sglang:d4p1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 128
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config ──
gconfig:
  n_samples: 1
  min_new_tokens: 0
  max_new_tokens: 4096
  greedy: false
  temperature: 0.99
  top_p: 0.99
  top_k: 100
  stop:
    - "</search>"

# ── Actor (Training) — Megatron TP1/PP1 ──
actor:
  backend: "megatron:d4t1p1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /publicdata/huggingface.co/Qwen/Qwen3-4B  # ← model path
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  reward_norm:
    mean_level: batch
    std_level: batch
  adv_norm:
    mean_level: batch
    std_level: batch
  megatron:
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — Megatron colocated with actor ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── SGLang ──
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 16384
  mem_fraction_static: 0.8

# ── Datasets ──
# Train: NQ search_r1 (question / golden_answers)
train_dataset:
  batch_size: 128
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/code/Search-R1/data/nq_search/  # ← train data
  type: rl

# Valid: HotpotQA (problem / answer)
valid_dataset:
  batch_size: 128
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/HotpotQA  # ← valid data
  type: rl

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10000
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
