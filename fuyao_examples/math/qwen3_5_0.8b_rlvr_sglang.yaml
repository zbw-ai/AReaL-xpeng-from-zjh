# Qwen3.5-0.8B (Dense VLM) Math RLVR — minimal validation config
#   - Training: Megatron (mbridge)
#   - Inference: SGLang (TP1, DP1)
#   - Cluster: 1 node × 2 GPU (Actor 1 + SGLang 1)
#   - Purpose: validate Qwen3.5 VLM + SGLang + transformers compatibility
#
# Usage:
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type math_rlvr \
#       --config fuyao_examples/math/qwen3_5_0.8b_rlvr_sglang.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3_5-0.8b-validation
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 1
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 1
  n_gpus_per_node: 2
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) — SGLang TP1 × DP1 = 1 GPU ──
rollout:
  backend: "sglang:d1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  setup_timeout: 600.0
  max_concurrent_rollouts: 8
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config ──
gconfig:
  n_samples: 4
  min_new_tokens: 0
  max_new_tokens: 1024
  greedy: false
  temperature: 0.9
  top_p: 1.0
  top_k: -1

# ── Actor (Training) — Megatron: 1 GPU ──
actor:
  backend: "megatron:d1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /dataset_rc_b1/models/Qwen3.5-0.8B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 4096
    n_mbs_divisor: 1
  pad_to_maximum: true
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_distributed_optimizer: false
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.001
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 2.0
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — colocated with actor ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 4096
    n_mbs_divisor: 1
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── SGLang ──
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 2048
  mem_fraction_static: 0.8
  disable_custom_all_reduce: true

# ── Datasets ──
train_dataset:
  batch_size: 4
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

valid_dataset:
  batch_size: 4
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
