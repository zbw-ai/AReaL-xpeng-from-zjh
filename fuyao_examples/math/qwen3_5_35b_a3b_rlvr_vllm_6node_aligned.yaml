# Qwen3.5-35B-A3B Math RLVR — 6-node, parameters aligned with qwen3_8b benchmark
#
# Purpose: 在 v17 (qwen3_5_35b_a3b_rlvr_vllm_6node.yaml) 验证通过的基础上,
# 把超参风格对齐到 fuyao_examples/math/qwen3_8b_rlvr_bench_v070_sync_aligned.yaml,
# 让 35B-A3B 跑出"正常的吞吐"指标。
#
# Reference (8B benchmark):
#   batch_size: 32, n_samples: 8 (256 seqs/step)
#   max_new_tokens: 31744 (32K)
#   temperature: 0.99, top_p: 0.99, top_k: 100
#   ppo_n_minibatches: 2, kl_ctl: 0.001
#   weight_update_mode: xccl, optimizer: adam_bf16
#
# 对齐 + 保留:
#   ✅ n_samples: 2 → 8 (GRPO 标准, 对齐 8B)
#   ✅ batch_size: 4 (保持; total samples 8 → 32, 4× v17)
#   ✅ ppo_n_minibatches: 2 → 4 (32/4=8/minibatch ÷ DP=4 = 2 samples/rank, 2× v17 显存)
#   ✅ temperature: 0.9 → 0.99
#   ✅ top_p: 1.0 → 0.99
#   ✅ top_k: -1 → 100
#   ✅ kl_ctl: 0.001 (一致)
#   ✅ adv_norm/reward_norm/eps_clip 等 PPO 超参对齐 8B
#   ✅ rollout.max_concurrent_rollouts: 8 → 32 (跟上 batch_size×n_samples=32)
#   ✅ vllm.max_num_seqs: 8 → 32
#
# 35B + MoE + VL 必须保留 (与 8B 不同):
#   🔒 pad_to_maximum: true (Qwen3.5 GDN 强制 BSHD)
#   🔒 weight_update_mode: disk (xccl 与 q||gate 不兼容)
#   🔒 enable_offload: true (Actor+Ref colocate OOM 防护)
#   🔒 optimizer.type: adam (用户原则: fp32 optimizer states 保精度)
#   🔒 grad_reduce_dtype: float32 (同上)
#   🔒 backend: megatron:(attn:d4p4t2|ffn:e8t1) (PP=4 显存)
#
# 显存预算 (基于 v17 实测扩展):
#   v17 ppo_update: allocated 21.27 GB / reserved 24.94 GB / device 38.58 GB
#   对齐版预估:     allocated ~42  GB / reserved ~50  GB / device ~62  GB (~78%)
#   仍留 ~18 GB headroom 给 MoE 负载不均和 weight-update 瞬态
#
# max_new_tokens 选择:
#   8B benchmark: 31744 (32K). 直接对齐到 35B 上会让 token/step =
#     32 × 31744 = 1.0M tokens/step, 单 rank activation 几十倍, 必 OOM。
#   本配置: 2048. 先与 v17 一致, 验证吞吐曲线稳定后再单独放大 (4096/8192)。
#   后续可在另一个 _longctx 派生 yaml 里探索, 不在本文件中调。
#
# Throughput 期望 (粗算, 实测以 swanlab 为准):
#   v17:        1   sample/rank/minibatch × 2048 tok = 2K  tok/rank/step (PPO)
#   本配置:     2   sample/rank/minibatch × 2048 tok = 4K  tok/rank/step (PPO)
#   step time:  v17 ~6 min/step (rollout + train + 3.5 min disk 同步)
#   预估:       ~7-8 min/step (rollout 32 vs 8 是 4×, 但 vLLM 并发吃掉)
#
# GPU layout (与 v17 完全一致):
#   Actor (32 GPU): megatron:(attn:d4p4t2|ffn:e8t1)
#   vLLM  (16 GPU): vllm:d8t2
#   Ref: colocated with actor

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3_5-35b-a3b-aligned
trial_name: trial0

seed: 42
enable_offload: true   # 35B colocate 必需
total_train_epochs: 10
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 6
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) ──
rollout:
  backend: "vllm:d8t2"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  setup_timeout: 1200.0
  # 与 batch_size × n_samples = 4 × 8 = 32 对齐, 让 rollout 可同时跑满
  max_concurrent_rollouts: 32
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config — 采样参数对齐 8B benchmark ──
gconfig:
  n_samples: 8                # 2 → 8, GRPO 标准, 对齐 8B
  min_new_tokens: 0
  max_new_tokens: 2048        # 暂保持; 显存稳定后可在派生配置中放大
  max_tokens: 4096            # = max_new_tokens × 2 (prompt + gen 等额预算)
  greedy: false
  temperature: 0.99           # 0.9 → 0.99
  top_p: 0.99                 # 1.0 → 0.99
  top_k: 100                  # -1 → 100

eval_gconfig:
  n_samples: 1                # eval 单样本, 降低 vLLM 负载
  min_new_tokens: 0
  max_new_tokens: 2048
  max_tokens: 4096
  greedy: false
  temperature: 0.6            # eval 用更确定的采样
  top_p: 1.0
  top_k: -1

# ── Actor (Training) — 与 v17 同布局; PPO 超参对齐 8B ──
actor:
  backend: "megatron:(attn:d4p4t2|ffn:e8t1)"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /dataset_rc_b1/models/Qwen3.5-35B-A3B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32   # 35B 保留 fp32 reduce (8B 用 bf16; 这里精度优先)
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 4096    # 1 个 (prompt 2048 + gen 2048) 序列
    n_mbs_divisor: 1
  pad_to_maximum: true         # Qwen3.5 GDN 强制 BSHD
  optimizer:
    type: adam                 # 8B 用 adam_bf16; 这里仍 fp32 (用户原则)
    lr: 1.0e-6                 # 与 8B 一致
    weight_decay: 0.1          # 0.01 → 0.1, 对齐 8B
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true   # 与 grad_reduce_dtype 配套
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
  # ── PPO 超参 (与 8B benchmark 完全一致) ──
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.001
  ppo_n_minibatches: 4         # 32 samples / 4 = 8/minibatch ÷ DP=4 = 2/rank
                               # (v17: 2 minibatches; 本配置 sample 数 4×, 切 4 minibatch)
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 2.0
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  # ── 35B 必需的 disk-mode (xccl 与 q||gate 不兼容) ──
  weight_update_mode: disk
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — colocate 模式, 与 actor 共 GPU ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 4096
    n_mbs_divisor: 1
  pad_to_maximum: true
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── vLLM ──
vllm:
  model: ${actor.path}
  seed: ${seed}
  dtype: ${actor.dtype}
  # 同 max_concurrent_rollouts, 让 vLLM 调度器接受 32 个并发
  max_num_seqs: 32
  max_model_len: 4096           # 2048 prompt + 2048 gen
  gpu_memory_utilization: 0.68  # v17 实证安全值, 留 ~12 GB 给 weight-update 瞬态
  enforce_eager: true           # Qwen3.5 cudagraph 兼容性问题, 与 v17 一致

# ── Datasets ──
# 数据集对齐 8B benchmark 用 deepmath_math_rule_20k (text-only 数学难题)。
# valid 用 aime_2024_rule (与 8B benchmark 一致)。
# 如果 deepmath 路径不可用, 回退用 dapo_math_17k_processed (v17 配置)。
train_dataset:
  batch_size: 4               # 保持 v17 (放大放在 n_samples 维度避免 minibatch 过细)
  shuffle: true
  pin_memory: true
  num_workers: 4
  max_length: 2048
  path: /workspace/lijl42@xiaopeng.com/datasets/hard_prompts/20251203_for_rl/data/deepmath_math_rule_20k.parquet
  type: deepmath

valid_dataset:
  batch_size: 4
  pin_memory: true
  num_workers: 4
  max_length: 2048
  path: /workspace/lijl42@xiaopeng.com/data_process/20251205_rl_data/aime_2024_rule.parquet
  type: aime_2024

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10000
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  save_interval: 1
  profile_steps: []
  session_tracer:
    enabled: true               # 对齐 8B benchmark, 开 session_tracer 收 timing 用于吞吐分析
    flush_threshold: 256
