# Qwen3.5-35B-A3B Math RLVR — 6-node, batch=32 + seq=8K (v21)
#
# 用途: 在 v20 (batch=32, seq=2K) 基础上, 把序列长度 2K → 8K, 作为 32K
# 目标的 sanity check。变量只动 seq, 其他与 v20 完全一致, 用以精确测出
# seq 长度对 actor / vLLM 显存的影响斜率。
#
# 与 v20 唯一差异:
#   max_new_tokens:           2048  → 4096    (gen 长度 2×)
#   max_tokens (gen+prompt):  4096  → 8192    (含 4K prompt headroom)
#   max_tokens_per_mb:        4096  → 8192    (单 8K seq/microbatch, BSHD 强制)
#   vllm.max_model_len:       4096  → 8192    (≥ max_tokens)
#   vllm.max_num_seqs:        256   → 128     (KV cache per seq 涨 2× → 总量持平)
#   rollout.max_concurrent_rollouts: 256 → 128(跟 vllm.max_num_seqs 同步)
#   train/valid_dataset.max_length: 2048 → 4096  (prompt 长度上限)
#
# 不变 (与 v20 一致):
#   batch_size: 32, n_samples: 8 (256 samples/step, 对齐 8B benchmark)
#   ppo_n_minibatches: 32 (256/32=8/mb ÷ DP=4 = 2/rank)
#   backend: megatron:(attn:d4p4t2|ffn:e8t1) (PP=4, 6 节点 32 GPU actor)
#   weight_decay: 0.1, temperature/top_p/top_k: 0.99/0.99/100
#
# 35B + MoE + VL 强约束:
#   🔒 pad_to_maximum: true (Qwen3.5 GDN 强制 BSHD)
#   🔒 weight_update_mode: disk (xccl q||gate 修复中)
#   🔒 enable_offload: true (Actor+Ref colocate)
#   🔒 optimizer.type: adam (fp32 states)
#   🔒 backend: PP=4 不变 (8K @ PP=4 在 6 节点是预估安全; 32K 才需要 PP=8)
#
# 显存预估 (基于 megatron-engine-expert 调研):
#   v20 实测:  actor 38.56 GB / vLLM ~56 GB
#   v21 估计: actor ~45-50 GB / vLLM ~56 GB
#     - actor: MoE alltoall dispatch buffer 随 token 数 linear, 8K = 2× v20
#       softmax attn s² peak 4× (但 GDN 是 O(s) 不爆), recompute=full 摊平
#     - vLLM: KV cache per seq 2× × max_num_seqs 减半 → 总量持平
#
# 32K 目标的渐进路径 (megatron-engine-expert 分析):
#   v21 (本配置)  : 8K  @ 6 节点 PP=4    sanity check, 测显存放大斜率
#   v22          : 16K @ 6 节点 PP=8    DP=2, layers 40/8=5 整除
#   v23          : 32K @ 9 节点 PP=8    actor 64 + vLLM 8, DP=4
#                                        ⚠️ CP=2 不可行 (GDN + pad_to_maximum
#                                        与 packed CP 硬阻断 megatron_engine.py:1643)
#
# 风险关注点:
#   1. actor 8K 实测显存若 > 50 GB → MoE dispatch buffer 系数比预估大,
#      v22/v23 需重新规划
#   2. vLLM 8K KV cache 若实测 > 60 GB → max_num_seqs 还需调小或 v22 必须更激进
#
# GPU layout (与 v17/v20 完全一致):
#   Actor (32 GPU): megatron:(attn:d4p4t2|ffn:e8t1)
#   vLLM  (16 GPU): vllm:d8t2
#   Ref: colocated with actor

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3_5-35b-a3b-seq8k
trial_name: trial0

seed: 42
enable_offload: true   # 35B colocate 必需
total_train_epochs: 10
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 6
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) ──
rollout:
  backend: "vllm:d8t2"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  setup_timeout: 1200.0
  # v21: 256 → 128, 与 vllm.max_num_seqs 同步; KV cache per seq 2× 后总量持平
  max_concurrent_rollouts: 128
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config — 采样参数对齐 8B benchmark ──
gconfig:
  n_samples: 8                # 2 → 8, GRPO 标准, 对齐 8B
  min_new_tokens: 0
  max_new_tokens: 4096        # v21: 2048 → 4096
  max_tokens: 8192            # v21: 4096 → 8192 (4K prompt + 4K gen)
  greedy: false
  temperature: 0.99           # 0.9 → 0.99
  top_p: 0.99                 # 1.0 → 0.99
  top_k: 100                  # -1 → 100

eval_gconfig:
  n_samples: 1                # eval 单样本, 降低 vLLM 负载
  min_new_tokens: 0
  max_new_tokens: 4096        # v21: 与 train 一致, 2048 → 4096
  max_tokens: 8192            # v21: 4096 → 8192
  greedy: false
  temperature: 0.6            # eval 用更确定的采样
  top_p: 1.0
  top_k: -1

# ── Actor (Training) — 与 v17 同布局; PPO 超参对齐 8B ──
actor:
  backend: "megatron:(attn:d4p4t2|ffn:e8t1)"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /dataset_rc_b1/models/Qwen3.5-35B-A3B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32   # 35B 保留 fp32 reduce (8B 用 bf16; 这里精度优先)
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 8192    # v21: 4096 → 8192, 1 个 (4K prompt + 4K gen) 序列 (BSHD 强制单 seq/microbatch)
    n_mbs_divisor: 1
  pad_to_maximum: true         # Qwen3.5 GDN 强制 BSHD
  optimizer:
    type: adam                 # 8B 用 adam_bf16; 这里仍 fp32 (用户原则)
    lr: 1.0e-6                 # 与 8B 一致
    weight_decay: 0.1          # 0.01 → 0.1, 对齐 8B
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true   # 与 grad_reduce_dtype 配套
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
  # ── PPO 超参 (与 8B benchmark 完全一致) ──
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.001
  # 256 samples / 32 = 8/minibatch ÷ DP=4 = 2 sample/rank
  # 与 v18 的 (32 samples / 4 minibatch / DP=4 = 2 sample/rank) 完全相同,
  # 显存峰值预期一致, 只是 PPO 内做更多次梯度更新 (32 vs 4)。
  ppo_n_minibatches: 32
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 2.0
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  # ── 35B 必需的 disk-mode (xccl 与 q||gate 不兼容) ──
  weight_update_mode: disk
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — colocate 模式, 与 actor 共 GPU ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 8192    # v21: 4096 → 8192, 与 actor 一致
    n_mbs_divisor: 1
  pad_to_maximum: true
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── vLLM ──
vllm:
  model: ${actor.path}
  seed: ${seed}
  dtype: ${actor.dtype}
  # v21: 256 → 128, KV cache per seq 2× (8K vs 4K), 总 KV cache 持平 v20
  max_num_seqs: 128
  max_model_len: 8192           # v21: 4096 → 8192 (4K prompt + 4K gen)
  gpu_memory_utilization: 0.68  # v17 实证安全值, 留 ~12 GB 给 weight-update 瞬态
  enforce_eager: true           # Qwen3.5 cudagraph 兼容性问题, 与 v17 一致

# ── Datasets ──
# 数据集对齐 8B benchmark 用 deepmath_math_rule_20k (text-only 数学难题)。
# valid 用 aime_2024_rule (与 8B benchmark 一致)。
# 如果 deepmath 路径不可用, 回退用 dapo_math_17k_processed (v17 配置)。
train_dataset:
  batch_size: 32              # 4 → 32, 完全对齐 8B benchmark
  shuffle: true
  pin_memory: true
  num_workers: 4
  max_length: 4096            # v21: 2048 → 4096 prompt 上限
  path: /workspace/lijl42@xiaopeng.com/datasets/hard_prompts/20251203_for_rl/data/deepmath_math_rule_20k.parquet
  type: deepmath

valid_dataset:
  batch_size: 4
  pin_memory: true
  num_workers: 4
  max_length: 4096            # v21: 2048 → 4096 prompt 上限
  path: /workspace/lijl42@xiaopeng.com/data_process/20251205_rl_data/aime_2024_rule.parquet
  type: aime_2024

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10000
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  save_interval: 1
  profile_steps: []
  session_tracer:
    enabled: true               # 对齐 8B benchmark, 开 session_tracer 收 timing 用于吞吐分析
    flush_threshold: 256
