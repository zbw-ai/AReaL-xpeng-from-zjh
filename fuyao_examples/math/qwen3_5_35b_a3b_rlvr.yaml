# Qwen3.5-35B-A3B (MoE + GDN) Math RLVR — dapo_math_17k
#   - Training: Archon FSDP-only (Phase 1 MVP, no TP/EP)
#   - Inference: SGLang (TP4, DP4)
#   - Algorithm: GRPO
#   - Data: dapo_math_17k_processed
#   - Cluster: 4 nodes × 8 GPU = 32 GPU (A100 80G)
#   - Sequence: 32K max response
#
# GPU layout (32 GPUs total):
#   Actor  (16 GPU): archon:d16 = FSDP across 16 GPU
#   SGLang (16 GPU): sglang:d4t4 = DP4 × TP4 = 16 GPU
#   Ref: colocated with actor
#
# Phase 1 NOTE: FSDP-only has high all-gather overhead for MoE layers.
# Phase 2 will add EP+TP for production throughput.
#
# Usage:
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type math_rlvr \
#       --config fuyao_examples/math/qwen3_5_35b_a3b_rlvr.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3_5-35b-a3b-math-rlvr
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 10
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 4
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) — SGLang TP4 × DP4 = 16 GPU ──
# TP=4 matches num_kv_heads=4 (1 head per GPU, optimal split)
# Qwen3.5 GDN layers use recurrent state (no KV cache), so only 9/36
# full attention layers need KV — inference is very memory-efficient.
rollout:
  backend: "sglang:d4t4"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  setup_timeout: 600.0
  max_concurrent_rollouts: 64
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config ──
gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 16384
  greedy: false
  temperature: 0.9
  top_p: 1.0
  top_k: -1

# ── Actor (Training) — Archon FSDP-only: 16 GPU ──
# Phase 1: Pure FSDP across 16 GPUs. All 35.5B params are sharded.
# Each GPU holds 1/16 of model state (~55 GB peak, fits in 80 GB).
actor:
  backend: "archon:d16"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /dataset_rc_b1/models/Qwen3.5-35B-A3B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32
  mb_spec:
    n_mbs: 4
    granularity: 1
    max_tokens_per_mb: 32768
    n_mbs_divisor: 1
  pad_to_maximum: false
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  archon:
    offload_params: false
    activation_checkpoint:
      mode: full
    enable_compile: true
    reshard_after_forward_policy: default
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.001
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 2.0
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — Archon colocated with actor ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 4
    granularity: 1
    max_tokens_per_mb: 32768
    n_mbs_divisor: 1
  optimizer: null
  archon:
    offload_params: false
    activation_checkpoint:
      mode: full
    enable_compile: true
    reshard_after_forward_policy: default
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── SGLang ──
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 32768
  mem_fraction_static: 0.82
  disable_custom_all_reduce: true

# ── Datasets — dapo_math_17k ──
train_dataset:
  batch_size: 8
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

valid_dataset:
  batch_size: 8
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10000
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
