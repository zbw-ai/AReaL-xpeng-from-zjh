# Qwen3.5-35B-A3B (MoE + GDN) Math RLVR — dapo_math_17k
#   - Training: Megatron with Expert Parallelism (mbridge)
#   - Inference: vLLM
#   - Algorithm: GRPO
#   - Data: dapo_math_17k_processed
#   - Cluster: 4 nodes × 8 GPU = 32 GPU (A100 80G)
#
# Based on ALL learnings from the Qwen3.5-0.8B validation
# (docs/fuyao-experiments/qwen3_5-adaptation.md).
#
# ─────────────────────────────────────────────────────────────────────
# Qwen3.5-35B-A3B actual config (verified via inspect_qwen3_5_35b_config.sh):
#   num_attention_heads=16   num_key_value_heads=2   head_dim=256
#   hidden_size=2048         num_hidden_layers=40    attn_output_gate=true
#   num_experts=256          num_experts_per_tok=8   moe_intermediate_size=512
#
# GPU layout (32 GPUs total, 4 nodes × 8 GPU):
#   Actor (16 GPU): megatron:(attn:d4p2t2|ffn:e8t1)
#     - attn: DP=4, PP=2, TP=2 (TP=2 is MANDATORY: num_kv_heads=2)
#     - ffn:  EP=8, ETP=1 (MoE experts sharded across 8 ranks)
#   vLLM  (16 GPU): vllm:d8t2
#     - DP=8 × TP=2 (TP=2 is MANDATORY: same constraint)
#     - TP=1 not an option: 35B bf16 weights (~70 GB) won't fit on single A100-80G
#   Ref: colocated with actor
#
# ─────────────────────────────────────────────────────────────────────
# TP constraint explanation (from 0.8B validation findings):
#   num_kv_heads=2 means Megatron's GQA split handles TP<=2 cleanly.
#   TP>2 triggers num_query_groups bump (get_query_key_value_tensors:310-315),
#   inflating the attention gate dim to 2× of Q dim, crashing
#   _apply_output_gate at mbridge/qwen3_5/attention.py:360.
#   vLLM side has an analogous GQA replicate bug in its weight-update path.
#   Disk mode (used here) uses vLLM native load_weights which should tolerate
#   TP > num_kv_heads, but staying at TP=2 is the safest proven path.
#
# ─────────────────────────────────────────────────────────────────────
# Usage:
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type math_rlvr \
#       --config fuyao_examples/math/qwen3_5_35b_a3b_rlvr_vllm.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3_5-35b-a3b-math-rlvr
trial_name: trial0

seed: 42
enable_offload: true  # MANDATORY for 35B colocated actor+ref: offloads idle engine
                      # params/optimizer to CPU to avoid ~48GB GPU overlap
                      # (mirror of veRL's param_offload+optimizer_offload+grad_offload)
total_train_epochs: 10
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 4
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) ──
# Default assumes num_kv_heads >= 8 (verify before run). Otherwise change TP.
rollout:
  backend: "vllm:d8t2"   # TP=2 (num_kv_heads=2), DP=8 for throughput
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  setup_timeout: 1200.0   # 35B MoE startup over NFS takes time
  max_concurrent_rollouts: 64
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config ──
gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 8192
  greedy: false
  temperature: 0.9
  top_p: 1.0
  top_k: -1

# ── Actor (Training) ──
# Default aligns with veRL's run_qwen3_5-35b-megatron.sh:
# TP=2 for attention (safe for num_kv_heads >= 2), EP=8 for MoE.
# PP=2 to fit 35B params + optimizer states across 16 GPU.
actor:
  # attn: DP=4, PP=2, TP=2 (TP=2 mandatory, num_kv_heads=2)
  # ffn:  EP=8 × ETP=1 for 256 MoE experts (32 experts per EP rank)
  backend: "megatron:(attn:d4p2t2|ffn:e8t1)"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /dataset_rc_b1/models/Qwen3.5-35B-A3B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  grad_reduce_dtype: float32
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 4096   # lowered from 10240 to bound compute_logp activation memory
    n_mbs_divisor: 1
  # REQUIRED for Qwen3.5 GDN (bshd format; THD not supported).
  # Automatically disables incompatible Megatron fusions
  # (apply_rope_fusion, masked_softmax_fusion, bias_*_fusion,
  #  gradient_accumulation_fusion) — see megatron_engine.py.
  pad_to_maximum: true
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0.01
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  megatron:
    wrap_with_ddp: true
    ddp:
      grad_reduce_in_fp32: true
      overlap_grad_reduce: false
      overlap_param_gather: false
      use_distributed_optimizer: true
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
    moe_router_dtype: fp32
    moe_token_dispatcher_type: alltoall
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.001
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 2.0
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  # Use disk mode: xccl path is incompatible with Qwen3.5's q||gate
  # concat q_proj format (vLLM's internal buffer layout mismatch).
  # Disk mode writes HF safetensor, vLLM reloads via native load_weights.
  # At 35B with ~70 GB per iteration over NFS, weight sync ~20-30s which
  # is comparable to (or less than) compute per step. Acceptable.
  weight_update_mode: disk
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — Megatron colocated with actor ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    n_mbs: 1
    granularity: 1
    max_tokens_per_mb: 4096   # lowered from 10240 to bound compute_logp activation memory
    n_mbs_divisor: 1
  pad_to_maximum: true   # REQUIRED: mirror actor (both engines need BSHD)
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── vLLM ──
vllm:
  model: ${actor.path}
  seed: ${seed}
  dtype: ${actor.dtype}
  max_num_seqs: 64
  max_model_len: 10240
  gpu_memory_utilization: 0.8
  enforce_eager: true   # avoids cudagraph compat issues for Qwen3.5

# ── Datasets — dapo_math_17k ──
train_dataset:
  batch_size: 8
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

valid_dataset:
  batch_size: 8
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10000
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
