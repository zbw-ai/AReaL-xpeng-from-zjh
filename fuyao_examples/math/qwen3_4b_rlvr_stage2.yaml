# Qwen3 4B Math RLVR — POLARIS Stage 2
#
# Changes from Stage 1 (qwen3_4b_rlvr.yaml):
#   1. actor.path → Stage-1 best checkpoint (step199, best avg)
#   2. train_dataset → filtered dataset (drop avg_reward > 0.9)
#   3. temperature → 1.45 (POLARIS: increase per stage)
#   4. max_new_tokens → 39936 (align with POLARIS Stage-2)
#   5. kl_ctl → 0.01 (10x stronger, counter entropy collapse)
#
# GPU layout (2 nodes × 8 GPU = 16 GPU):
#   Actor  (8 GPU, node 0): megatron:d1t4c2p1 = DP1 × TP4 × CP2
#   SGLang (8 GPU, node 1): sglang:d2p1t4     = DP2 × TP4
#   Ref: colocated with actor
#
# Usage:
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type math_rlvr \
#       --config fuyao_examples/math/qwen3_4b_rlvr_stage2.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3-4b-polaris-rlvr-s2
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 3  # Stage-2: more epochs on harder data
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 2
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) — SGLang ──
rollout:
  backend: "sglang:d2p1t4"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 64
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  setup_timeout: 600
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config — POLARIS Stage-2 ──
gconfig:
  n_samples: 8
  min_new_tokens: 0
  max_new_tokens: 48128              # POLARIS Stage-2: 48K (requires YaRN factor 1.5 in config.json)
  greedy: false
  temperature: 1.45                  # POLARIS: +0.05 per stage (was 1.4)
  top_p: 1.0
  top_k: -1

# ── Actor (Training) — from Stage-1 best checkpoint ──
actor:
  backend: "megatron:d1t4c2p1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  # Stage-1 best checkpoint (step199, Avg=75.79)
  path: /dataset_rc_llmrl/zengbw1/areal_experiments/bifrost-2026041721040601-zengbw1-qwen3-4b-polaris-rlvr/files/checkpoints/root/bifrost-2026041721040601-zengbw1-qwen3-4b-polaris-rlvr/trial0/default/epoch0epochstep199globalstep199
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 49152         # Match max_new_tokens 48128 + prompt (~1K)
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0.1
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  eps_clip: 0.2
  eps_clip_higher: 0.28
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0
  reward_bias: 0.0
  kl_ctl: 0.01                      # 10x stronger than Stage-1 (was 0.001)
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  mask_no_eos_with_zero: true
  behave_imp_weight_cap: 2.0
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  megatron:
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — same as Stage-1 base (NOT the trained checkpoint) ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /publicdata/huggingface.co/Qwen/Qwen3-4B  # Keep original base for KL reference
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 49152
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── SGLang ──
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 61440              # YaRN-extended: 40960 * 1.5 (POLARIS Stage-2)
  mem_fraction_static: 0.85
  disable_custom_all_reduce: true

# ── Datasets — filtered (hard subset) ──
train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zengbw1@xiaopeng.com/dataset/dapo_math/dapo_math_stage2_filtered.parquet
  type: dapo_math

valid_dataset:
  batch_size: 16
  pin_memory: true
  num_workers: 4
  path: /workspace/lijl42@xiaopeng.com/data_process/20251205_rl_data/aime_2024_rule.parquet
  type: aime_2024

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 50                 # More frequent saves on harder data (fewer steps total)
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}2
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  save_interval: 1
  profile_steps: []
  session_tracer:
    enabled: true
    flush_threshold: 256
