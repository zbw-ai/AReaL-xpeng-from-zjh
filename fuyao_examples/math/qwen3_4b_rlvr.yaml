# Qwen3 4B Math RLVR — Aligned with POLARIS recipe
#
# Reference: POLARIS (HKU NLP + ByteDance Seed)
#   - Model: Qwen3-4B (post-trained)
#   - Algorithm: DAPO+GRPO+ fusion (no KL, no entropy loss, Clip-Higher)
#   - Data: dapo_math_17k (TODO: filter by pass-rate after first run)
#   - Temperature: 1.4 (POLARIS Stage-1)
#   - n_samples: 8
#   - Cluster: 1 node × 8 GPU (A100 80G)
#
# Purpose: Validate AReaL RL framework can produce reward improvement
#          on a model+data combination in the ideal difficulty range.
#
# GPU layout (8 GPUs):
#   Actor  (4 GPU): megatron:d4t1p1 = DP4 × TP1 × PP1
#   SGLang (4 GPU): sglang:d4p1t1  = DP4 × TP1
#   Ref: colocated with actor
#
# Usage:
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type math_rlvr \
#       --config fuyao_examples/math/qwen3_4b_rlvr.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3-4b-polaris-rlvr
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 2  # 快速验证，看 reward 趋势
tokenizer_path: ${actor.path}

cluster:
  n_nodes: 2
  n_gpus_per_node: 8
  fileroot: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/files
  name_resolve:
    type: nfs
    nfs_record_root: /dataset_rc_llmrl/zengbw1/areal_experiments/${experiment_name}/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) — SGLang ──
rollout:
  backend: "sglang:d4p1t2"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 64
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config — aligned with POLARIS Stage-1 ──
gconfig:
  n_samples: 8                   # POLARIS: 8 (was 4)
  min_new_tokens: 0
  max_new_tokens: 31744              # POLARIS Stage-1: 39936, aligned to 32K
  greedy: false
  temperature: 1.4               # POLARIS Stage-1: 1.4 (was 0.99)
  top_p: 1.0                     # POLARIS: 1.0 (was 0.99)
  top_k: -1                       # POLARIS: disabled

# ── Actor (Training) — Megatron TP1/PP1 ──
actor:
  backend: "megatron:d2t2p2"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /publicdata/huggingface.co/Qwen/Qwen3-4B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0.1             # POLARIS style (was 0)
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: cosine
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.01
  eps_clip: 0.2
  eps_clip_higher: 0.28           # POLARIS: Clip-Higher (新增)
  temperature: ${gconfig.temperature}
  reward_scaling: 1.0             # 不缩放 (was 10.0)
  reward_bias: 0.0                # 不偏置 (was -0.5)
  kl_ctl: 0.001                   # POLARIS actual value
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  mask_no_eos_with_zero: true     # DAPO: 截断序列排除出 loss (新增)
  behave_imp_weight_cap: 2.0      # (was 5.0)
  behave_imp_weight_mode: token_mask
  adv_norm:
    mean_level: batch
    std_level: batch
  reward_norm:
    mean_level: group
    std_level: group
    group_size: ${gconfig.n_samples}
  megatron:
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — Megatron colocated with actor ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── SGLang ──
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 32768              # Support 32K response + 1K prompt
  mem_fraction_static: 0.85
  disable_custom_all_reduce: true    # Required for TP2

# ── Datasets ──
train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

valid_dataset:
  batch_size: 16
  pin_memory: true
  num_workers: 4
  path: /workspace/lijl42@xiaopeng.com/data_process/20251205_rl_data/aime_2024_rule.parquet
  type: aime_2024

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 100
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 20
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  save_interval: 1
  profile_steps: []
  session_tracer:
    enabled: true
    flush_threshold: 256
