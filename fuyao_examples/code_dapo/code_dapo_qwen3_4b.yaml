# Qwen3 4B Code DAPO Agentic RL
#   - Training: Megatron (TP1/PP1)
#   - Inference: SGLang
#   - Data: dapo_17k_with_python_code
#   - Model: Qwen3-4B (Instruct)
#
# Usage:
#   bash fuyao_examples/fuyao_areal_run.sh \
#       --run-type code_dapo \
#       --config fuyao_examples/code_dapo/code_dapo_qwen3_4b.yaml

experiment_name: ${oc.env:BIFROST_JOB_NAME,default}-qwen3-4b-code-dapo
trial_name: trial0

seed: 42
enable_offload: false
total_train_epochs: 10
tokenizer_path: ${actor.path}

# ── Agentic Config ──
sandbox_type: "local"  # "local" or "execd"
execd_endpoint: ""     # Set via EXECD_ENDPOINT env var for execd mode
code_timeout: 10
max_turns: 10
max_tool_uses: 5
max_total_tokens: 8192
system_prompt: "Please reason step by step, and put your final answer within '\\boxed{}', e.g. \\boxed{A}."

cluster:
  n_nodes: 1
  n_gpus_per_node: 8
  fileroot: /tmp/areal/experiments
  name_resolve:
    type: nfs
    nfs_record_root: /tmp/areal/name_resolve

scheduler:
  type: local

# ── Rollout (Inference) — SGLang ──
rollout:
  backend: "sglang:d4p1t1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 128
  queue_size: null
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: false
  scheduling_spec: ${actor.scheduling_spec}
  fileroot: ${cluster.fileroot}
  tokenizer_path: ${tokenizer_path}
  dump_to_file: true

# ── Generation Config ──
gconfig:
  n_samples: 1
  min_new_tokens: 0
  max_new_tokens: 4096
  greedy: false
  temperature: 0.99
  top_p: 0.99
  top_k: 100
  stop:
    - "</code>"

# ── Actor (Training) — Megatron TP1/PP1 ──
actor:
  backend: "megatron:d4t1p1"
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: /publicdata/huggingface.co/Qwen/Qwen3-4B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: true
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer:
    type: adam
    lr: 1.0e-6
    weight_decay: 0
    beta1: 0.9
    beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0
  eps_clip: 0.2
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behave_imp_weight_cap: 5.0
  adv_norm:
    mean_level: batch
    std_level: batch
  megatron:
    use_deterministic_algorithms: true
    recompute_granularity: full
    recompute_method: uniform
    recompute_num_layers: 1
  weight_update_mode: xccl
  max_new_tokens: ${gconfig.max_new_tokens}
  scheduling_spec:
    - task_type: worker
      port_count: 2
      gpu: 1
      mem: 32
      cmd: python3 -m areal.infra.rpc.rpc_server
      env_vars: {}

# ── Reference Model — Megatron colocated with actor ──
ref:
  backend: ${actor.backend}
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 16384
  optimizer: null
  scheduling_strategy:
    type: colocation
    target: actor
  scheduling_spec: ${actor.scheduling_spec}

# ── SGLang ──
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: false
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 16384
  mem_fraction_static: 0.8

# ── Datasets — dapo_math_17k (same data, code execution env) ──
train_dataset:
  batch_size: 128
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

valid_dataset:
  batch_size: 128
  pin_memory: true
  num_workers: 4
  path: /workspace/zhangjh37@xiaopeng.com/data/dapo_math_17k_processed
  type: dapo_math

# ── Utilities ──
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10000
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: null
  freq_steps: null
  freq_secs: null

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: 10
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: disabled
  swanlab:
    mode: online
    project: areal_train
    name: ${experiment_name}-${trial_name}
    api_key: ${oc.env:SWANLAB_API_KEY,}

perf_tracer:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  enabled: false
  session_tracer:
    enabled: false
